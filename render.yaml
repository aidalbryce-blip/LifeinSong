services:
  - type: web
    name: lifeinsong-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: lifeinsong-storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: VOICE_STORAGE_DIR
        value: /var/data/voice_storage
      - key: SONG_STORAGE_DIR
        value: /var/data/song_storage
